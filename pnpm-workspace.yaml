packages:
  - .

overrides:
  cross-spawn: '>=6.0.6'
  glob: '>=10.5.0'
  node-forge: '>=1.3.2'
  jws: '>=3.2.3'
  qs: '>=6.14.1'
  tunnel-rat>zustand: '5.0.12'
  js-yaml: '^3.14.2'
  minimatch@3.1.5>brace-expansion: '1.1.12'
  minimatch@5.1.9>brace-expansion: '2.0.3'
  minimatch@10.2.5>brace-expansion: '5.0.5'
  npm-run-path@6.0.0>unicorn-magic: '0.4.0'

allowBuilds:
  # root dependency
  esbuild: true

  # watcher optional native package
  '@parcel/watcher': false

  # uploadthing optional native package
  msgpackr-extract: false

  #@takumi-rs
  sharp: false

  # sentry
  '@sentry/cli': false
  '@fingerprintjs/fingerprintjs-pro-react': false

  # Cloudflare Workers local runtime
  workerd: true

patchedDependencies:
  '@tanstack/markdown@0.0.5': patches/@tanstack__markdown@0.0.5.patch

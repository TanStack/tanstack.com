# Allow exotic (URL) subdependencies from @tanstack/ai@774 and its deps.
# This is needed because @tanstack/ai@774 (a pkg.pr.new preview build) references
# @tanstack/ai-event-client via a URL, which pnpm v11 blocks by default.
blockExoticSubdeps: false

overrides:
  # Pin @tanstack/ai-event-client to @774 build to satisfy the URL reference
  # inside @tanstack/ai@774's package.json.
  '@tanstack/ai-event-client': 'https://pkg.pr.new/TanStack/ai/@tanstack/ai-event-client@774'
  cross-spawn: '>=6.0.6'
  glob: '>=10.5.0'
  node-forge: '>=1.3.2'
  jws: '>=3.2.3'
  qs: '>=6.14.1'
  tunnel-rat>zustand: '5.0.12'
  js-yaml: '^3.14.2'
  minimatch@3.1.5>brace-expansion: '1.1.12'
  minimatch@5.1.9>brace-expansion: '2.0.3'
  minimatch@10.2.5>brace-expansion: '5.0.5'

allowBuilds:
  # root dependency
  esbuild: true

  # @netlify/vite-plugin-tanstack-start
  '@parcel/watcher': false

  # @netlify/vite-plugin-tanstack-start & uploadthing
  msgpackr-extract: false

  #@takumi-rs
  sharp: false

  # sentry
  '@sentry/cli': false
  '@fingerprintjs/fingerprintjs-pro-react': false

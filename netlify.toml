[build.environment]
NODE_OPTIONS = "--max-old-space-size=4096"

[build]
command = "vite build && cp src/instrument.server.mjs dist/server"
publish = "dist/client"

[functions]
directory = "netlify/functions"
included_files = [
  "public/fonts/Inter-Regular.ttf",
  "public/fonts/Inter-ExtraBold.ttf",
  "public/images/logos/splash-dark.png",
]
# @takumi-rs/core ships platform-specific .node binaries via napi-rs's runtime
# require() dispatcher — esbuild can't statically trace the optional deps. Keep
# the napi loader external so node_modules/@takumi-rs/core ships as-is, and
# also list the Linux x64 binary package explicitly: Netlify's bundler only
# follows declared deps for `external_node_modules`, so the optional platform
# package would otherwise be dropped (verified — function failed at runtime
# with "Cannot find native binding"). Netlify functions run on AWS Lambda
# Amazon Linux 2 (glibc, x64), hence linux-x64-gnu.
external_node_modules = [
  "@takumi-rs/core",
  "@takumi-rs/core-linux-x64-gnu",
]

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
for = "/*"
[headers.values]
Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# WebContainer requires SharedArrayBuffer which needs COOP/COEP headers
# Only apply to /builder to avoid breaking external resources on other pages
[[headers]]
for = "/builder"
[headers.values]
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"

[[headers]]
for = "/builder/*"
[headers.values]
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"

# Reverse-proxy Google Analytics through our own origin so requests are
# first-party (escapes hostname-based ad blockers, longer-lived cookies,
# cleaner CSP). gtag.js is told to use this prefix as its transport_url.
[[redirects]]
from = "/_a/gtag.js"
to = "https://www.googletagmanager.com/gtag/js?id=G-JMT1Z50SPS"
status = 200
force = true

[[redirects]]
from = "/_a/g/collect"
to = "https://www.google-analytics.com/g/collect"
status = 200
force = true
